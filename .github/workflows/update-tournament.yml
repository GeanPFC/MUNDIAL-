name: Actualizar probabilidades del torneo

# Corre la simulacion Monte Carlo (Python, 50k) con datos frescos y redespliega la web.
# Totalmente automatico: no requiere tocar el PC. Tambien se puede lanzar a mano.
on:
  schedule:
    - cron: "0 9 * * *"      # todos los dias a las 09:00 UTC
  workflow_dispatch: {}        # boton para ejecutarlo manualmente desde GitHub

permissions:
  contents: write              # para commitear el snapshot actualizado

concurrency:
  group: tournament-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # IDs del proyecto Vercel (no son secretos). El token si es secreto.
      VERCEL_ORG_ID: team_DpwZUm7pFEWi932rACBS0ewk
      VERCEL_PROJECT_ID: prj_Cnk9AM43pqa8ZX6TCadavjDBHMde
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install numpy pandas scipy scikit-learn pyyaml matplotlib

      - name: Descargar datos frescos (resultados internacionales)
        run: python -m src.data_collection --raw-dir data/raw --overwrite

      - name: Reconstruir calendario 2026 (fijar partidos ya jugados)
        run: |
          python - <<'PY'
          from src.config import load_config
          from src.data_sources_2026 import load_groups, build_group_schedule, write_group_schedule
          cfg = load_config()
          groups = load_groups(cfg.path("data", "wc2026_groups"))
          sched = build_group_schedule(cfg.path("data", "results_csv"), groups)
          write_group_schedule(sched, cfg.path("data", "wc2026_schedule"))
          print("Calendario actualizado:", int((sched["status"] == "played").sum()), "jugados de 72")
          PY

      - name: Simular torneo y generar snapshot
        run: python build_tournament_snapshot.py --n 50000 --as-of "$(date -u +%F)"

      - name: Commit del snapshot actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/tournament_snapshot.json vercel-app/public/tournament_snapshot.json data/raw/wc2026_schedule.csv
          git commit -m "Auto: probabilidades del torneo $(date -u +%F)" || echo "Sin cambios que commitear"
          git push || echo "Push omitido"

      - name: Desplegar a Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" --cwd vercel-app
